<div class="forgot-container">
  <h2>Recuperar Contraseña</h2>

  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div *ngIf="tempPassword" class="success">
    <p>{{ successMessage }}</p>
    <p><strong>Tu nueva contraseña temporal es:</strong></p>
    <p class="temp-password">{{ tempPassword }}</p>
    <p>Copia esta contraseña e inicia sesión con ella. Se recomienda cambiarla después.</p>
  </div>

  <form (ngSubmit)="onSubmit()" *ngIf="!tempPassword">
    <div>
      <label>Email:</label>
      <input type="email" [(ngModel)]="email" name="email" required placeholder="Ingresa tu email registrado">
    </div>
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Enviando...' : 'Recuperar Contraseña' }}
    </button>
  </form>

  <div class="links">
    <a routerLink="/login">Volver al Login</a>
  </div>
</div>
