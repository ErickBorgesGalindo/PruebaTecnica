<h2>Usuarios</h2>

<app-user-form
  [userToEdit]="userToEdit"
  (userCreated)="onFormClose()"
></app-user-form>

<div class="export-buttons">
  <a [href]="apiUrl + '/export/users/pdf'" target="_blank">Descargar PDF</a>
  <a [href]="apiUrl + '/export/users/excel'" target="_blank">Descargar Excel</a>
</div>

<table>
  <thead>
    <tr>
      <th>Código</th>
      <th>Usuario</th>
      <th>Nombre</th>
      <th>Fecha de Creación</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.code }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.name }}</td>
      <td>{{ user.created_at | date:'dd/MM/yyyy HH:mm' }}</td>
      <td>
        <button (click)="editUser(user)">Editar</button>
        <button (click)="deleteUser(user.id)">Eliminar</button>
        <button (click)="viewDetail(user)">Detalle</button>
      </td>
    </tr>
  </tbody>
</table>

<app-user-detail
  *ngIf="showDetail"
  [user]="userDetail"
  (close)="closeDetail()"
></app-user-detail>
